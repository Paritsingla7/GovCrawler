name: Deploy Release

on:
  push:
    tags:
      - 'v*' # Triggers ONLY on tags starting with v (e.g., v1.0, v2.1.3)

permissions:
  contents: write # Required for creating releases and uploading assets

jobs:
  build-and-release:
    strategy:
      matrix:
        # This spins up 3 separate environments concurrently
        include:
          - os: windows-latest
            artifact_name: windows
          - os: macos-latest
            artifact_name: macos
          - os: ubuntu-latest
            artifact_name: linux

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Ensure this matches your local environment
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt 

    - name: Build executable from .spec
      run: pyinstaller GovCrawler.spec --clean

    - name: Zip Build Outputs (Windows)
      if: matrix.os == 'windows-latest'
      # Powershell zip command
      run: Compress-Archive -Path dist\* -DestinationPath GovCrawler-${{ matrix.artifact_name }}-${{ github.ref_name }}.zip
      
    - name: Zip Build Outputs (Mac & Linux)
      if: matrix.os != 'windows-latest'
      # Bash zip command. Uses 'cd' so the internal folder structure is clean.
      run: cd dist && zip -r ../GovCrawler-${{ matrix.artifact_name }}-${{ github.ref_name }}.zip .

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: GovCrawler-${{ matrix.artifact_name }}-${{ github.ref_name }}.zip
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
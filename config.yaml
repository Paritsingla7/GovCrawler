# --- Crawler Configuration ---

defaults:
  keyword: "contact"
  max_depth: 4
  max_links_per_page: 80       # depth-0 limit; depth-1 = ~27, depth-2+ = 15 (tapered in code)
  num_workers: 55
  page_timeout: 30
  url_process_timeout: 75
  request_delay: 1.5        # seconds between requests to the same domain

# --- Target Domains ---
target_domains:
  - ".gov.in"
  - ".nic.in"

# --- Tier 1: Official Search APIs ---
# Google CSE: https://programmablesearchengine.google.com/
# Bing API:   https://portal.azure.com (Bing Search v7)
# When enabled, these find targeted contact pages directly.

google_cse_api:
  enabled: false
  api_key: "YOUR_GOOGLE_API_KEY"
  cse_id: "YOUR_CSE_ID"

bing_search_api:
  enabled: false
  api_key: "YOUR_BING_API_KEY"

# --- Tier 2: india.gov.in Directory ---
# Contact page paths synthesized for each domain found in the directory.
contact_path_hints:
  - "/contact-us"
  - "/contact-us.htm"
  - "/contact"
  - "/en/contact-us"

# --- User Agent ---
user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

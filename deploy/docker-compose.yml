services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: govcrawler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: govcrawler
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Loopback-only, for running scripts/migrate_sqlite_to_pg.py from the host.
    # Remove this once the one-time migration is done — nothing else needs it,
    # migrate/api/proxy all reach `db` over the internal compose network.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govcrawler"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CREDENTIAL_ENC_KEY: ${CREDENTIAL_ENC_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CREDENTIAL_ENC_KEY: ${CREDENTIAL_ENC_KEY}
    expose:
      - "8001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  proxy:
    image: caddy:2
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata: {}
  caddy_data: {}
